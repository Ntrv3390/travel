version: '3.8'

services:
  # PostgreSQL Database
  db-master:
    image: postgres:15-alpine
    container_name: travel-db-master
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-travel_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-network

  # Go Backend API
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-api-gateway
    environment:
      PORT: 8080
      DB_HOST: db-master
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-travel_db}
      DB_SSLMODE: disable
      HEADOUT_API_KEY: ${HEADOUT_API_KEY:-}
      HEADOUT_ENV: ${HEADOUT_ENV:-sandbox}
      HEADOUT_URL: ${HEADOUT_URL:-}
      HEADOUT_SANDBOX_BASE_URL: ${HEADOUT_SANDBOX_BASE_URL:-https://sandbox.api.dev-headout.com/api/public}
      HEADOUT_STAGE_BASE_URL: ${HEADOUT_STAGE_BASE_URL:-https://sandbox.api.dev-headout.com/api/public}
      HEADOUT_PROD_BASE_URL: ${HEADOUT_PROD_BASE_URL:-https://www.headout.com/api/public}
      ENV: ${ENV:-development}
      # GTTD Configuration
      GTTD_DEV_SFTP_HOST: ${GTTD_DEV_SFTP_HOST:-sftp-dev.things-to-do.google.com}
      GTTD_DEV_SFTP_PORT: ${GTTD_DEV_SFTP_PORT:-22}
      GTTD_DEV_SFTP_USERNAME: ${GTTD_DEV_SFTP_USERNAME:-traviia-dev}
      GTTD_DEV_SFTP_REMOTE_DIR: ${GTTD_DEV_SFTP_REMOTE_DIR:-/uploads/traviia}
      GTTD_DEV_SSH_PRIVATE_KEY_PATH: /run/secrets/gttd_dev_ssh_key
      GTTD_PROD_SFTP_HOST: ${GTTD_PROD_SFTP_HOST:-sftp.things-to-do.google.com}
      GTTD_PROD_SFTP_PORT: ${GTTD_PROD_SFTP_PORT:-22}
      GTTD_PROD_SFTP_USERNAME: ${GTTD_PROD_SFTP_USERNAME:-traviia-prod}
      GTTD_PROD_SFTP_REMOTE_DIR: ${GTTD_PROD_SFTP_REMOTE_DIR:-/uploads/traviia}
      GTTD_PROD_SSH_PRIVATE_KEY_PATH: /run/secrets/gttd_prod_ssh_key
      GTTD_BASE_URL: ${GTTD_BASE_URL:-https://traviia.com}
      GTTD_FEED_OUTPUT_DIR: ${GTTD_FEED_OUTPUT_DIR:-/tmp/gttd_feeds}
      GTTD_CRON_SCHEDULE: ${GTTD_CRON_SCHEDULE:-0 2 * * *}
      GTTD_ENV: ${GTTD_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-triipzy-jwt-secret-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@triipzy.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      # Sync Worker Pool
      SYNC_WORKER_COUNT: ${SYNC_WORKER_COUNT:-20}
      SYNC_RATE_LIMIT_PER_SEC: ${SYNC_RATE_LIMIT_PER_SEC:-10}
      SYNC_RATE_BURST: ${SYNC_RATE_BURST:-20}
      SYNC_MAX_RETRIES: ${SYNC_MAX_RETRIES:-3}
      SYNC_RETRY_BASE_DELAY_MS: ${SYNC_RETRY_BASE_DELAY_MS:-500}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db-master:
        condition: service_healthy
    secrets:
      - gttd_dev_ssh_key
      - gttd_prod_ssh_key
    networks:
      - travel-network
    restart: unless-stopped

networks:
  travel-network:
    driver: bridge

volumes:
  postgres_data:

secrets:
  gttd_dev_ssh_key:
    file: ./secrets/gttd_dev_ssh_key
  gttd_prod_ssh_key:
    file: ./secrets/gttd_prod_ssh_key
